<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ValueBet Bot{% endblock %}</title>
    <style>
        :root {
            --bg: #0a0c14;
            --surface: #13162a;
            --surface2: #1c2040;
            --surface3: #252950;
            --accent: #7c6fff;
            --accent2: #00e5b0;
            --accent3: #ff6b6b;
            --yellow: #ffd166;
            --blue: #4fc3f7;
            --text: #e8eaf6;
            --text-dim: #7b7fa8;
            --border: #252950;
            --success: #06d6a0;
            --fail: #ef476f;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
        }

        /* ── NAV ── */
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            height: 58px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav .logo {
            font-size: 1.1rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-right: 1rem;
            letter-spacing: 0.5px;
        }
        nav a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 0.4rem 0.9rem;
            border-radius: 8px;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        nav a:hover { color: var(--text); background: var(--surface2); }
        nav a.active { color: var(--text); background: var(--surface3); }

        /* ── LAYOUT ── */
        .container { max-width: 1380px; margin: 0 auto; padding: 2rem; }
        .page-header { margin-bottom: 2rem; }
        .page-header h1 { font-size: 1.5rem; font-weight: 700; }
        .page-header p  { color: var(--text-dim); font-size: 0.9rem; margin-top: 0.3rem; }

        /* ── CARDS ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.5rem;
        }
        .card-title {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-dim);
            margin-bottom: 1rem;
        }

        /* ── STAT GRID ── */
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.3rem 1rem;
            text-align: center;
            transition: border-color 0.2s;
        }
        .stat-card:hover { border-color: var(--accent); }
        .stat-card .val  { font-size: 1.9rem; font-weight: 800; color: var(--accent2); line-height: 1; }
        .stat-card .lbl  { font-size: 0.75rem; color: var(--text-dim); margin-top: 0.4rem; }

        /* ── TABLE ── */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        thead tr { border-bottom: 2px solid var(--border); }
        th {
            text-align: left;
            padding: 0.75rem 0.6rem;
            color: var(--text-dim);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.72rem;
            letter-spacing: 0.6px;
            white-space: nowrap;
        }
        td { padding: 0.7rem 0.6rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
        tr:hover td { background: var(--surface2); }

        /* ── BADGES ── */
        .badge {
            display: inline-block;
            padding: 0.18rem 0.55rem;
            border-radius: 20px;
            font-size: 0.76rem;
            font-weight: 600;
        }
        .badge-win     { background: #06d6a015; color: var(--success); border: 1px solid #06d6a030; }
        .badge-loss    { background: #ef476f15; color: var(--fail);    border: 1px solid #ef476f30; }
        .badge-pending { background: #ffd16615; color: var(--yellow);  border: 1px solid #ffd16630; }
        .badge-league  { background: var(--surface2); color: var(--accent); border: 1px solid var(--border); font-size: 0.72rem; }
        .badge-market  { background: var(--surface3); color: var(--blue); border: 1px solid var(--border); font-size: 0.72rem; }
        .badge-bn      { background: #ff6b6b15; color: #ff9999; border: 1px solid #ff6b6b30; font-size: 0.72rem; }

        /* ── VALUE COLORS ── */
        .c-high { color: var(--success); font-weight: 700; }
        .c-mid  { color: var(--yellow);  font-weight: 600; }
        .c-low  { color: var(--text-dim); }
        .c-pos  { color: var(--success); }
        .c-neg  { color: var(--fail); }

        /* ── PROGRESS BAR ── */
        .progress { background: var(--surface2); border-radius: 20px; overflow: hidden; height: 8px; }
        .progress-bar { height: 100%; border-radius: 20px; transition: width 1s; }

        /* ── TABS ── */
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .tab {
            padding: 0.5rem 1.1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-dim);
            transition: all 0.15s;
        }
        .tab:hover  { background: var(--surface2); color: var(--text); }
        .tab.active { background: var(--accent); border-color: var(--accent); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* ── MISC ── */
        .empty { text-align: center; color: var(--text-dim); padding: 3rem; }
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.5rem; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.5rem; }
        .mt1 { margin-top: 1rem; }   .mt2 { margin-top: 1.5rem; }   .mt3 { margin-top: 2rem; }
        .mb1 { margin-bottom: 1rem; } .mb2 { margin-bottom: 1.5rem; }
        h2 { font-size: 1.15rem; font-weight: 700; color: var(--accent); margin-bottom: 1rem; }
        h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.8rem; }
        .chip {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 6px;
            font-size: 0.72rem;
            font-weight: 600;
            background: var(--surface3);
            color: var(--text-dim);
        }
    </style>
</head>
<body>
    <nav>
        <span class="logo">⚽ ValueBet</span>
        <a href="/" {% if request.path == '/' %}class="active"{% endif %}>🏠 Dashboard</a>
        <a href="/live" {% if request.path == '/live' %}class="active"{% endif %}>⚡ Aujourd'hui</a>
        <a href="/history" {% if request.path == '/history' %}class="active"{% endif %}>📋 Historique</a>
        <a href="/stats" {% if request.path == '/stats' %}class="active"{% endif %}>📊 Statistiques</a>
        <a href="/config" {% if request.path == '/config' %}class="active"{% endif %}>⚙️ Config</a>
    </nav>
    {% block content %}{% endblock %}
    <script>
    // Système de tabs universel
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            const group = tab.dataset.group;
            const target = tab.dataset.target;
            document.querySelectorAll(`.tab[data-group="${group}"]`).forEach(t => t.classList.remove('active'));
            document.querySelectorAll(`.tab-content[data-group="${group}"]`).forEach(c => c.classList.remove('active'));
            tab.classList.add('active');
            document.querySelector(`.tab-content[data-group="${group}"][data-id="${target}"]`)?.classList.add('active');
        });
    });
    </script>
</body>
</html>
